{% extends 'layout/base.html' %}

{% block title %} Trang chủ {% endblock %}

{% block content %}
<style>
.login-container {
    max-width: 400px;
    margin: auto;
    padding: 30px;
    background-color: #ffffff;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    margin-top: 20px;
    margin-bottom: 20px;
}

/* Tiêu đề của form */
.login-header {
    margin-bottom: 20px;
    font-size: 24px;
}

.form-label {
    display: block;
    text-align: left;
    margin-bottom: 5px;
    font-weight: bold;
}

/* Căn chỉnh các input */
.form-control {
    width: 100%;
    padding: 10px;
    font-size: 14px;
}

/* Căn giữa nút đăng ký */
.bt-dn {
    display: flex;
    justify-content: center;
    margin-top: 20px;
}

/* Nút đăng ký */
.btn {
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
}
.mt-3 {
    margin-top: 15px;
}
</style>
<div class="login-container">
    <h2 class="login-header">Đăng ký tài khoản</h2>
    <form>
        <div class="mb-3">
            <label for="name" class="form-label">Họ và tên</label>
            <input type="text" class="form-control" id="name" placeholder="Nhập họ và tên" required>
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="Nhập email" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Mật khẩu</label>
            <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu" required>
        </div>
        <div class="mb-3">
            <label for="confirm-password" class="form-label">Xác nhận mật khẩu</label>
            <input type="password" class="form-control" id="confirm-password" placeholder="Xác nhận mật khẩu" required>
        </div>
        <!-- Div chứa button căn giữa -->
        <div class="bt-dn">
            <button type="submit" class="btn btn-primary">Đăng ký</button>
        </div>
    </form>
    <p class="mt-3">Đã có tài khoản? <a href="login.html">Đăng nhập tại đây</a></p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% endblock%}
